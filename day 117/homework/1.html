<!DOCTYPE html>

    <title>Store</title>
</head>
<body>

    <h1>პროდუქტების სია</h1>
    
    <button id="fetch-btn">პროდუქტების ჩატვირთვა</button>
    
    <hr>

    <div id="products-container">
        <p>პროდუქტები ჯერ არ არის ჩატვირთული.</p>
    </div>

    <hr>

    <div id="cart-section">
        <h2>კალათა</h2>
        <ul id="cart-items-list">
            <p>კალათა ცარიელია</p>
        </ul>
        
        <p><strong>ჯამი: $ <span id="total-sum">0</span></strong></p>
        
        <button id="buy-now-btn" disabled>Buy now</button>
    </div>

    <script src="3.js"></script>
</body>
