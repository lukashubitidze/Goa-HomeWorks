<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Reaction Time Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #light {
      width: 150px;
      height: 150px;
      margin: 40px auto;
      border-radius: 50%;
      background: red;
      box-shadow: 0 0 20px red;
      transition: 0.3s;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #444;
      color: white;
    }

    button:hover {
      background: #666;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>Reaction Time Game 🚦</h1>

<div id="light"></div>

<button id="startBtn">დაწყება</button>

<div id="result"></div>

<script>
  const light = document.getElementById("light");
  const startBtn = document.getElementById("startBtn");
  const result = document.getElementById("result");

  let startTime = 0;
  let timeout;
  let ready = false;

  startBtn.addEventListener("click", () => {
    result.textContent = "დაელოდე მწვანეს...";
    light.style.background = "red";
    light.style.boxShadow = "0 0 20px red";
    ready = false;

    const delay = Math.random() * 3000 + 2000; // 2-5 წამი

    timeout = setTimeout(() => {
      light.style.background = "green";
      light.style.boxShadow = "0 0 20px green";
      startTime = Date.now();
      ready = true;
    }, delay);
  });

  light.addEventListener("click", () => {
    if (!ready) {
      clearTimeout(timeout);
      result.textContent = "ძალიან ადრე დააჭირე ❌";
    } else {
      const reactionTime = Date.now() - startTime;
      result.textContent = "შენი დრო: " + reactionTime + " ms ⚡";
      ready = false;
    }
  });
</script>

</body>
</html>
