<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Reaction Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-purple-500 via-pink-500 to-red-500 h-screen flex items-center justify-center">

  <div class="text-center space-y-6">
    <h1 class="text-4xl font-bold text-white">რეაქციის თამაში ⚡</h1>

    <div id="box"
      class="w-64 h-64 bg-blue-500 rounded-full flex items-center justify-center text-white text-xl font-semibold 
            cursor-pointer transition-all duration-300 hover:scale-105 shadow-2xl">
      დააჭირე დასაწყებად
    </div>

    <p id="result" class="text-white text-2xl font-bold"></p>
  </div>

  <script>
    const box = document.getElementById("box");
    const result = document.getElementById("result");

    let startTime = 0;
    let waiting = false;
    let canClick = false;

    box.addEventListener("click", () => {
      if (!waiting) {
        // თამაშის დაწყება
        result.textContent = "დაელოდე მწვანეს...";
        box.className = "w-64 h-64 bg-yellow-400 rounded-full flex items-center justify-center text-black text-xl font-semibold cursor-pointer transition-all duration-300 shadow-2xl";

        waiting = true;
        canClick = false;

        const delay = Math.random() * 3000 + 2000;

        setTimeout(() => {
          box.className = "w-64 h-64 bg-green-500 rounded-full flex items-center justify-center text-white text-xl font-semibold cursor-pointer transition-all duration-300 shadow-2xl animate-pulse";
          result.textContent = "დააჭირე!";
          startTime = Date.now();
          canClick = true;
        }, delay);

      } else {
        if (!canClick) {
          // ძალიან ადრე დააჭირა
          box.className = "w-64 h-64 bg-red-500 rounded-full flex items-center justify-center text-white text-xl font-semibold cursor-pointer transition-all duration-300 shadow-2xl";
          result.textContent = "ძალიან ადრე დააჭირე, წააგე";

          waiting = false;
        } else {
          // სწორ დროს დააჭირა
          const reactionTime = Date.now() - startTime;
          result.textContent = `შენი დრო: ${reactionTime} ms ⚡`;

          box.className = "w-64 h-64 bg-blue-500 rounded-full flex items-center justify-center text-white text-xl font-semibold cursor-pointer transition-all duration-300 shadow-2xl";

          waiting = false;
          canClick = false;
        }
      }
    });
  </script>

</body>
</html>
