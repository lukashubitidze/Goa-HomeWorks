<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex justify-center items-center h-screen bg-gray-900 text-white flex-col">

<button id="btn" class="bg-blue-500 px-6 py-3 rounded-xl">Signup</button>

<div id="form" class="hidden mt-5 space-y-3">
  <input class="p-2 rounded text-black" placeholder="Name">
  <input class="p-2 rounded text-black" placeholder="Email">
  <button id="submit" class="bg-green-500 px-4 py-2 rounded">Submit</button>
</div>

<p id="result"></p>

<script>
let start;

btn.onclick = () => {
  form.classList.remove("hidden");
  start = Date.now();
};

submit.onclick = () => {
  result.innerText = Date.now() - start + " ms";
};
</script>

</body>
</html>
