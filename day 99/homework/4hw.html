<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center h-screen">

<button id="start" class="bg-yellow-500 px-4 py-2 rounded">Start</button>

<div id="box" class="w-24 h-24 bg-gray-600 mt-4 cursor-pointer"></div>

<p id="res"></p>

<script>
let round=0, times=[], startTime;

function next(){
  if(round===5){
    res.innerText = "Avg: " + (times.reduce((a,b)=>a+b)/5) + " ms";
    return;
  }

  box.classList.replace("bg-green-500","bg-gray-600");

  setTimeout(()=>{
    box.classList.replace("bg-gray-600","bg-green-500");
    startTime = Date.now();
  }, Math.random()*2000+1000);
}

start.onclick = () => {
  round=0;
  times=[];
  next();
};

box.onclick = () => {
  if(box.classList.contains("bg-green-500")){
    times.push(Date.now()-startTime);
    round++;
    next();
  }
};
</script>

</body>
</html>
