<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resizable Box</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

  <div id="box" onclick="toggleSize()"
    class="bg-green-500 w-24 h-24 cursor-pointer transition-all duration-300">
  </div>

  <script>
    let isBig = false;

    function toggleSize() {
      const box = document.getElementById("box");
      if (isBig) {
        box.classList.remove("w-64", "h-64");
        box.classList.add("w-24", "h-24");
      } else {
        box.classList.remove("w-24", "h-24");
        box.classList.add("w-64", "h-64");
      }
      isBig = !isBig;
    }
  </script>

</body>
</html>
