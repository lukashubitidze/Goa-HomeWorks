<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-lg space-y-6">

  <h2 class="text-2xl font-bold">ფორმა</h2>

  <!-- ინფორმაცია -->
  <div>
    <h3 class="font-semibold mb-2">ინფორმაცია</h3>
    <input type="text" placeholder="სახელი"
      class="w-full p-3 border rounded-lg mb-2">
    <input type="text" placeholder="გვარი"
      class="w-full p-3 border rounded-lg">
  </div>

  <!-- კონტაქტი -->
  <div>
    <h3 class="font-semibold mb-2">კონტაქტი</h3>
    <input type="email" placeholder="Email"
      class="w-full p-3 border rounded-lg mb-2">
    <input type="tel" placeholder="ტელეფონი"
      class="w-full p-3 border rounded-lg">
  </div>

  <!-- დამატებითი -->
  <div>
    <h3 class="font-semibold mb-2">დამატებითი ინფორმაცია</h3>
    <textarea class="w-full p-3 border rounded-lg"></textarea>
  </div>

  </div>
</body>
</html>
