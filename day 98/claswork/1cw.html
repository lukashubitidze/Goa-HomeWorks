<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modal Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="1cw.js"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

  <!-- Open Button -->
  <button id="openBtn" class="px-6 py-2 bg-blue-500 text-white rounded-lg">
    Open Modal
  </button>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 flex items-center justify-center bg-black/50
                         opacity-0 pointer-events-none transition-opacity duration-300">

    <!-- Modal Content -->
    <div id="modalContent"
         class="bg-white rounded-lg shadow-lg p-6 w-80 transform scale-95 
         opacity-0 transition-all duration-300">

      <!-- Header -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold">Modal Title</h2>
        <button id="closeBtn" class="text-gray-500 hover:text-black text-xl">&times;</button>
      </div>

      <!-- Body -->
      <p class="text-gray-600">ეს არის Modal ფანჯარა TailwindCSS-ით.</p>

    </div>
  </div>
</body>
</html>
