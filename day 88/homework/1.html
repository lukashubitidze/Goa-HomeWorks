<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailwind Level 88</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script>
tailwind.config = {
  darkMode: "class"
}
</script>
</head>

<body class="bg-gray-100 dark:bg-gray-900">

<!-- MOBILE SIDEBAR BUTTON -->
<button id="menuBtn" class="lg:hidden fixed top-4 left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
Menu
</button>

<!-- SIDEBAR -->
<aside id="sidebar"
class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-gray-800 shadow-lg
transition-all duration-300 -translate-x-full lg:translate-x-0">

<nav class="mt-20 flex flex-col">
<a href="#" class="p-4 border-l-4 border-blue-600 bg-blue-100 dark:bg-gray-700">Dashboard</a>
<a href="#" class="p-4 hover:bg-gray-100 dark:hover:bg-gray-700 border-l-4 border-transparent">Profile</a>
<a href="#" class="p-4 hover:bg-gray-100 dark:hover:bg-gray-700 border-l-4 border-transparent">Settings</a>
<a href="#" class="p-4 hover:bg-gray-100 dark:hover:bg-gray-700 border-l-4 border-transparent">Logout</a>
</nav>

</aside>

<!-- MAIN CONTENT -->
<main class="p-10 lg:ml-64 space-y-20">

<!-- SECTION 1 GRID CARDS -->
<section>

<h2 class="text-2xl font-bold mb-6">Grid Cards</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">

<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl lg:col-span-2">
Card 1 (Featured)
</div>

<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 2</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 3</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 4</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 5</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 6</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 7</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 8</div>

</div>

</section>


<!-- SECTION 2 BOUNCE BUTTON -->
<section>

<h2 class="text-2xl font-bold mb-6">Responsive Bounce Button</h2>

<button
class="rounded-full px-6 py-4 bg-blue-600 text-white
animate-bounce lg:animate-none
hover:bg-black hover:text-white
focus:ring-4 focus:ring-blue-300 focus:animate-none
transition">

Click Me

</button>

</section>


<!-- SECTION 3 LOADER -->
<section class="flex items-center justify-center h-40">

<div class="flex gap-3">

<div class="w-2 h-2 bg-black dark:bg-white rounded-full animate-pulse"></div>
<div class="w-3 h-3 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:200ms]"></div>
<div class="w-4 h-4 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:400ms]"></div>
<div class="w-5 h-5 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:600ms]"></div>
<div class="w-6 h-6 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:800ms]"></div>

</div>

</section>


<!-- SECTION 5 ADVANCED HOVER CARD -->
<section>

<h2 class="text-2xl font-bold mb-6">Advanced Hover Card</h2>

<div class="group w-80 bg-white p-8 rounded-2xl shadow-xl
transform rotate-2 transition duration-500 ease-in-out
hover:scale-105 hover:-translate-y-3">

<h3 class="text-xl font-bold mb-4">Fancy Card</h3>

<p class="mb-4">
Hover the card to reveal the button.
</p>

<button
class="opacity-0 group-hover:opacity-100 transition
bg-blue-600 text-white px-4 py-2 rounded-lg">

Action

</button>

</div>

</section>

</main>


<script>

const btn = document.getElementById("menuBtn")
const sidebar = document.getElementById("sidebar")

btn.addEventListener("click", () => {
sidebar.classList.toggle("-translate-x-full")
})

</script>

</body>
</html>
